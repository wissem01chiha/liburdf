name: Bug Report
description: Report a problem in liburdf
title: "bug title"
labels: ["bug"]

body:
  - type: textarea
    attributes:
      label: Bug Description
      description: Clear and concise description of the issue.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Exact commands, inputs, and expected vs. actual results.
      placeholder: |
        1. Run `cmake .. && make`
        2. Execute `bazel build //target`
        3. Observe error
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Logs / Screenshots
      description: Attach compiler/build logs, runtime errors, or screenshots if applicable.

  - type: markdown
    attributes:
      value: "### Environment Details"

  - type: input
    attributes:
      label: OS & Version
      description: e.g., Ubuntu 22.04, macOS 14.2, Windows 11
    validations:
      required: true

  - type: input
    attributes:
      label: Compiler & Version
      description: e.g., GCC 13.2, Clang 17, MSVC 2022
    validations:
      required: true

  - type: input
    attributes:
      label: Build System
      description: e.g., CMake 3.28, Bazel 7.0
    validations:
      required: true

  - type: input
    attributes:
      label: Target Platform/Architecture
      description: e.g., x86_64, ARM64, Windows, Linux

  - type: textarea
    attributes:
      label: Dependencies/Libraries
      description: Versions of  third-party libraries.

  - type: textarea
    attributes:
      label: Additional Context
      description: Related issues/PRs, workarounds tried, or unusual system settings.
